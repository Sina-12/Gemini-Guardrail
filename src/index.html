<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Guardrail | Forensic Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="left-rail">
      <div class="brand-block">
        <p class="eyebrow">Geminni Guardrail</p>
        <h1>Auditing Summaries</h1>
      </div>
      <div class="search-wrap">
        <input id="search-input" type="text" placeholder="Search threads, claims, or evidence..." />
        <button id="search-btn">Search</button>
      </div>
      <div class="thread-head">
        <span>Argument Threads</span>
        <span id="result-count">—</span>
      </div>
      <div id="results-container" class="thread-list">
        <div class="empty-state">Loading threads...</div>
      </div>
    </aside>

    <main class="main-stage">
      <section id="detail-pane" class="analysis-stage">
        <div class="empty-center">
          <h2>Select a thread to start forensic auditing</h2>
          <p>The source-to-summary heatmap, trust gauge, and activity stream will initialize here.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/frontend.js"></script>
</body>
</html>
