<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CMV Summary Audit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
/* Main color, font, and spacing values used across the whole page */
:root {
  --bg:          #f4f1eb;
  --surface:     #ffffff;
  --surface2:    #f9f7f3;
  --border:      #e0dbd0;
  --border-dark: #c8c2b5;
  --text:        #1a1714;
  --text-mid:    #5a5550;
  --text-dim:    #9a9590;
  --accent-s:    #2d6a4f;
  --accent-s-bg: #edf7f2;
  --accent-u:    #9b2335;
  --accent-u-bg: #fdf0f2;
  --score-high:  #2d6a4f;
  --score-mid:   #b5760a;
  --score-low:   #9b2335;
  --font-serif:  'Fraunces', Georgia, serif;
  --font-mono:   'DM Mono', monospace;
  --r:           8px;
}

/* Simple reset so spacing is more consistent */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Top bar with app name and small subtitle */
header {
  background: var(--text);
  color: var(--bg);
  padding: 14px 28px;
  display: flex;
  align-items: baseline;
  gap: 14px;
  flex-wrap: wrap;
}

header h1 {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -.02em;
  color: #f4f1eb;
}

header .subtitle {
  font-size: 11px;
  color: #9a9590;
  letter-spacing: .04em;
}

/* Small tag on the right side of the header */
.header-chip {
  margin-left: auto;
  background: #2d2a27;
  border: 1px solid #3d3a37;
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 10px;
  color: #9a9590;
  letter-spacing: .06em;
  text-transform: uppercase;
}

/* Search area under the header */
.search-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

/* Text input for keyword search */
#search-input {
  flex: 1;
  min-width: 180px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 14px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
#search-input::placeholder { color: var(--text-dim); }
#search-input:focus { border-color: var(--text); }

/* Search button beside the input */
#search-btn {
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: var(--r);
  padding: 9px 18px;
  font-family: var(--font-serif);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s;
  white-space: nowrap;
}
#search-btn:hover { opacity: .82; }

/* Small text showing how many results are on screen */
.count-tag {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
}
#result-count { font-weight: 500; color: var(--text-mid); }

/* Main two column layout: thread list on left, detail panel on right */
.workspace {
  display: grid;
  grid-template-columns: 300px 1fr;
  flex: 1;
  overflow: hidden;
  height: calc(100vh - 101px);
}

/* Left side thread list */
.list-col {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--surface2);
}

/* Sticky small heading for the left column */
.col-header {
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* Container where JS inserts thread cards */
#results-container {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: opacity .2s;
}

/* Each clickable thread card in the left panel */
.thread-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
}
.thread-card:hover { border-color: var(--border-dark); box-shadow: 0 2px 6px rgba(0,0,0,.06); }
.thread-card.active { border-color: var(--text); background: var(--surface); }

.thread-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 7px;
}

.thread-id {
  font-family: var(--font-serif);
  font-size: 13px;
  font-weight: 700;
}

.thread-pills { display: flex; gap: 5px; }

/* Small S and U pills shown on each thread card */
.pill {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: .04em;
}
.pill-s         { background: var(--accent-s-bg); color: var(--accent-s); border: 1px solid #b7e0cc; }
.pill-u         { background: var(--accent-u-bg); color: var(--accent-u); border: 1px solid #f0c0c8; }
.pill-s.pill-sent-bad { opacity: .55; }
.pill-u.pill-sent-bad { opacity: .55; }
.pill-missing   { background: #f0ede8; color: var(--text-dim); border: 1px solid var(--border); }

/* Short preview text inside each thread card */
.thread-snippet {
  font-size: 11px;
  color: var(--text-mid);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Right side area where the selected thread is shown */
.detail-col {
  overflow-y: auto;
  padding: 28px 32px;
  background: var(--bg);
}

#detail-pane { max-width: 1200px; }

.detail-header { margin-bottom: 24px; }

.detail-title-row {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 8px;
}

.detail-title-row h2 {
  font-family: var(--font-serif);
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -.02em;
}

.accent { color: var(--accent-s); }

/* Small badge showing reviewer information */
.reviewer-tag {
  font-size: 11px;
  color: var(--text-dim);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px 9px;
}

.detail-subtitle {
  font-size: 12px;
  color: var(--text-mid);
  line-height: 1.7;
}

/* Two side by side columns for successful and unsuccessful branches */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

/* Each side stacks the original thread box and summary card */
.thread-column {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* Box for the original branch text */
.original-thread-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}

.original-thread-label {
  padding: 10px 18px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .05em;
  text-transform: uppercase;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  color: var(--text-mid);
}

.original-thread-text-box {
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Preview and full text for the original branch */
.original-thread-preview,
.original-thread-full {
  font-size: 12px;
  line-height: 1.8;
  color: var(--text);
}

.original-thread-full {
  display: none;
}

/* Expand the original thread when the JS adds the expanded class */
.original-thread-box.expanded .original-thread-preview {
  display: none;
}

.original-thread-box.expanded .original-thread-full {
  display: block;
}

/* Button used to expand the original thread text */
.thread-toggle-btn {
  align-self: flex-start;
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 5px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: background .12s, color .12s;
}

.thread-toggle-btn:hover {
  background: var(--surface2);
  color: var(--text);
}

/* Missing state for the original thread box */
.original-thread-box--missing .missing-text {
  padding: 20px 18px;
  color: var(--text-dim);
  font-size: 12px;
}

/* Main summary card */
.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.card-label {
  padding: 10px 18px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .05em;
  text-transform: uppercase;
}

.summary-card--s .card-label {
  background: var(--accent-s-bg);
  color: var(--accent-s);
  border-bottom: 1px solid #b7e0cc;
}

.summary-card--u .card-label {
  background: var(--accent-u-bg);
  color: var(--accent-u);
  border-bottom: 1px solid #f0c0c8;
}

.summary-card--missing .card-label {
  background: var(--surface2);
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
}

.missing-text {
  padding: 20px 18px;
  color: var(--text-dim);
  font-size: 12px;
}

/* Score row at the top of each summary card */
.scores-row {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
}

.score-block {
  flex: 1;
  padding: 12px 14px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.score-block:last-child { border-right: none; }

.score-label {
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.score-value {
  font-size: 12px;
  font-weight: 500;
}

.score-high .score-value { color: var(--score-high); }
.score-medium .score-value { color: var(--score-mid); }
.score-low .score-value { color: var(--score-low); }

.score-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 2px;
}

.score-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .4s ease;
}

.score-high .score-fill   { background: var(--score-high); }
.score-medium .score-fill { background: var(--score-mid); }
.score-low .score-fill    { background: var(--score-low); }

/* Area that contains preview and full summary text */
.summary-text-box {
  padding: 16px 18px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.summary-preview { font-size: 12px; line-height: 1.75; color: var(--text); }
.summary-full    { font-size: 12px; line-height: 1.75; color: var(--text); display: none; }

/* Expand the summary when JS adds the expanded class */
.summary-card.expanded .summary-preview { display: none; }
.summary-card.expanded .summary-full    { display: block; }

/* Button used to expand the summary text */
.toggle-btn {
  align-self: flex-start;
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 5px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: background .12s, color .12s;
}
.toggle-btn:hover { background: var(--surface2); color: var(--text); }

/* Small metadata strip at the bottom of the summary card */
.meta-row {
  padding: 10px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 16px;
  background: var(--surface2);
}

.meta-item { font-size: 11px; color: var(--text-dim); }
.meta-item strong { color: var(--text-mid); }

/* Shared empty and error state styling */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 10px;
  color: var(--text-dim);
  text-align: center;
}
.empty-icon { font-size: 28px; opacity: .4; }
.empty-state p { font-size: 12px; line-height: 1.7; }
.error-msg { color: var(--score-low); }

/* Stack the layout on smaller screens */
@media (max-width: 900px) {
  .workspace { grid-template-columns: 1fr; height: auto; }
  .list-col  { max-height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
  .summary-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Header area with app title and subtitle -->
<header>
  <h1>CMV Summary Audit</h1>
  <span class="subtitle">Change My View · Reddit Annotation Explorer</span>
  <span class="header-chip">43 threads · 3 labels</span>
</header>

<!-- Search controls -->
<div class="search-bar">
  <input type="text" id="search-input" placeholder="Filter by topic keyword — e.g. abortion, climate, tax…" />
  <button id="search-btn">Search</button>
  <span class="count-tag">Showing <span id="result-count">—</span></span>
</div>

<!-- Main app layout -->
<div class="workspace">
  <!-- Left side thread list -->
  <div class="list-col">
    <div class="col-header">Threads</div>
    <div id="results-container">
      <div class="empty-state"><p>Loading threads…</p></div>
    </div>
  </div>

  <!-- Right side detail panel -->
  <div class="detail-col">
    <div id="detail-pane">
      <div class="empty-state">
        <div class="empty-icon">←</div>
        <p>Select a thread from the list<br>to compare its successful and<br>unsuccessful summaries.</p>
      </div>
    </div>
  </div>
</div>

<!-- Front end logic is loaded from the JS file -->
<script src="/static/frontend.js"></script>
</body>
</html>
